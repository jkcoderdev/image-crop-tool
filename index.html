<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Crop Tool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <div class="app-logo">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M6 2v14a2 2 0 0 0 2 2h14"></path>
            <path d="M18 22V8a2 2 0 0 0-2-2H2"></path>
          </svg>
        </div>

        <div>
          <h1 class="app-title">Image Crop Tool</h1>
          <p class="app-subtitle">Import, transform, and export images.</p>
        </div>
      </header>

      <main class="layout-container">
        <aside class="sidebar">
          <div class="upload-area">
            <input class="upload-area__input" id="files-upload-input" type="file" multiple />

            <button class="upload-area__button">
              <div class="upload-area__icon">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path d="M12 3v12"></path>
                  <path d="m17 8-5-5-5 5"></path>
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                </svg>
              </div>

              <div>
                <p class="upload-area__text-primary">Add images</p>

                <p class="upload-area__text-secondary">Click to select multiple files</p>
              </div>
            </button>
          </div>

          <div class="images-list">
            <h2 class="images-list__heading">Images <span>(0)</span></h2>

            <div class="images-list__wrapper">
              <div class="images-list__placeholder images-list__placeholder">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <rect width="18" height="18" x="3" y="3" rx="2" ry="2"></rect>
                  <circle cx="9" cy="9" r="2"></circle>
                  <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"></path>
                </svg>

                <p>No images yet. Add some to get started.</p>
              </div>

              <div class="images-list__content" id="images-list"></div>
            </div>
          </div>
        </aside>

        <section class="editor">
          <div class="image-preview image-preview--active">
            <div class="image-preview__placeholder">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <rect width="18" height="18" x="3" y="3" rx="2" ry="2"></rect>
                <circle cx="9" cy="9" r="2"></circle>
                <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"></path>
              </svg>

              <p>Select an image to preview it here.</p>
            </div>

            <canvas class="image-preview__canvas" id="preview-canvas"></canvas>
          </div>

          <div class="image-controls">
            <div class="image-controls__group">
              <label class="image-controls__label">Aspect ratio</label>

              <div class="image-controls__ratio-button-group">
                <button class="image-controls__ratio-button image-controls__ratio-button--active" id="ratio-button-1-1">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="48"
                    height="48"
                    viewBox="0 0 48 48"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <rect width="34" height="34" x="7" y="7" rx="2" />
                  </svg>

                  <p>1&nbsp;1</p>
                </button>

                <button class="image-controls__ratio-button" id="ratio-button-4-3">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="48"
                    height="48"
                    viewBox="0 0 48 48"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <rect width="38" height="28" x="5" y="10" rx="2" />
                  </svg>

                  <p>4&nbsp;3</p>
                </button>

                <button class="image-controls__ratio-button" id="ratio-button-3-4">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="48"
                    height="48"
                    viewBox="0 0 48 48"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <rect width="28" height="38" x="10" y="5" rx="2" />
                  </svg>

                  <p>3<br />4</p>
                </button>

                <button class="image-controls__ratio-button" id="ratio-button-16-9">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="48"
                    height="48"
                    viewBox="0 0 48 48"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <rect width="42" height="24" x="3" y="12" rx="2" />
                  </svg>

                  <p>16&nbsp;9</p>
                </button>

                <button class="image-controls__ratio-button" id="ratio-button-9-16">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="48"
                    height="48"
                    viewBox="0 0 48 48"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <rect width="24" height="42" x="12" y="3" rx="2" />
                  </svg>

                  <p>9<br />16</p>
                </button>
              </div>
            </div>

            <div class="image-controls__group">
              <label class="image-controls__label">Orientation</label>

              <div class="image-controls__button-row">
                <button class="image-controls__button" id="orientation-button-ccw">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                  >
                    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                    <path d="M3 3v5h5"></path>
                  </svg>
                </button>

                <button class="image-controls__button" id="orientation-button-cw">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                  >
                    <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"></path>
                    <path d="M21 3v5h-5"></path>
                  </svg>
                </button>

                <button class="image-controls__button" id="orientation-button-reset">Reset</button>
              </div>
            </div>

            <div class="image-controls__group">
              <label class="image-controls__label">Z-axis rotation</label>

              <input class="image-controls__slider" id="rotation-slider" type="range" min="-90" max="90" value="0" />
            </div>

            <div class="image-controls__group">
              <label class="image-controls__label">Zoom</label>

              <div class="image-controls__button-row">
                <select class="image-controls__select" id="zoom-select">
                  <option value="1">100%</option>
                  <option value="1.5">150%</option>
                  <option value="2">200%</option>
                  <option value="3">300%</option>
                  <option value="4">400%</option>
                  <option value="6">600%</option>
                  <option value="8">800%</option>
                  <option value="12">1200%</option>
                  <option value="16">1600%</option>
                  <option value="24">2400%</option>
                  <option value="32">3200%</option>
                </select>

                <button class="image-controls__button" id="zoom-button-out">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                  >
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" x2="16.65" y1="21" y2="16.65"></line>
                    <line x1="8" x2="14" y1="11" y2="11"></line>
                  </svg>
                </button>

                <button class="image-controls__button" id="zoom-button-in">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                  >
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" x2="16.65" y1="21" y2="16.65"></line>
                    <line x1="11" x2="11" y1="8" y2="14"></line>
                    <line x1="8" x2="14" y1="11" y2="11"></line>
                  </svg>
                </button>

                <button class="image-controls__button" id="zoom-button-reset">Reset</button>
              </div>
            </div>
          </div>

          <div class="image-actions">
            <p class="image-info">No image selected</p>

            <button class="download-button">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <path d="M12 15V3"></path>
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <path d="m7 10 5 5 5-5"></path>
              </svg>

              Download
            </button>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
